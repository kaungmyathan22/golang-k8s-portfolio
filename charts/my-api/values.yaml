replicaCount: 2

image:
  repository: my-api
  tag: local
  pullPolicy: Never

service:
  port: 80
  targetPort: 3000

resources:
  requests:
    memory: '64Mi'
    cpu: '100m'
  limits:
    memory: '128Mi'
    cpu: '200m'

config:
  appEnv: 'production'
  appVersion: '1.0.0'
  logLevel: 'info'

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
