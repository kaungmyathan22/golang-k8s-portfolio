name: Build and Deploy

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: my-api
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: app/package.json
    - run: cd app && npm ci
    - run: cd app && npm test

  build-and-update:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Docker image
      run: |
        docker build -t $IMAGE_NAME:$IMAGE_TAG .
        echo "Built: $IMAGE_NAME:$IMAGE_TAG"

    - name: Run Trivy scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    - name: Update image tag in GitOps manifests
      run: |
        sed -i "s|image: my-api:.*|image: my-api:$IMAGE_TAG|g" \
          gitops/my-api/deployment.yaml

        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add gitops/my-api/deployment.yaml
        git commit -m "ci: update image tag to $IMAGE_TAG" || exit 0
        git push